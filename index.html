<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>SkizoTopUp • Roblox Royal Edition</title>
  <!-- Font Awesome 6 Pro -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    /* ========== ROYAL VARIABLES ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Hitam Royal */
      --obsidian: #050505;
      --jet-black: #0A0A0A;
      --onyx: #121212;
      --charcoal: #1A1A1A;
      --graphite: #222222;
      --slate: #2A2A2A;
      
      /* Emas Royal */
      --champagne: #F7E7CE;
      --champagne-dark: #E5D0B0;
      --gold-leaf: #D4AF37;
      --antique-gold: #C5A028;
      --old-gold: #B8860B;
      --royal-gold: #F5D742;
      --gold-glossy: linear-gradient(135deg, #F7E7CE 0%, #D4AF37 50%, #B8860B 100%);
      
      /* Abu-abu Premium */
      --platinum: #E5E4E2;
      --silver: #C0C0C0;
      --pewter: #8A8D8F;
      --steel: #71797E;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #F5F5F5;
      --text-tertiary: #E0E0E0;
      --text-muted: #A0A0A0;
      --text-gold: #D4AF37;
      
      /* Gradients */
      --gradient-royal: linear-gradient(135deg, #D4AF37 0%, #F7E7CE 50%, #B8860B 100%);
      --gradient-obsidian: linear-gradient(145deg, #1A1A1A 0%, #050505 100%);
      --gradient-onyx: linear-gradient(145deg, #222222 0%, #121212 100%);
      
      /* Shadows */
      --shadow-xs: 0 2px 5px rgba(0,0,0,0.3);
      --shadow-sm: 0 5px 15px rgba(0,0,0,0.4);
      --shadow-md: 0 10px 25px rgba(0,0,0,0.5);
      --shadow-lg: 0 15px 35px rgba(0,0,0,0.6);
      --shadow-xl: 0 25px 50px rgba(0,0,0,0.7);
      --shadow-gold: 0 10px 25px rgba(212,175,55,0.15);
      --shadow-gold-lg: 0 20px 40px rgba(212,175,55,0.2);
      
      /* Borders */
      --border-gold-thin: 1px solid rgba(212,175,55,0.15);
      --border-gold: 1px solid rgba(212,175,55,0.3);
      --border-gold-bold: 1px solid rgba(212,175,55,0.5);
      
      /* Radius */
      --radius-xs: 8px;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-xxl: 40px;
      --radius-full: 999px;
    }

    body {
      background: var(--obsidian);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Royal Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(212,175,55,0.02) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(212,175,55,0.02) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(212,175,55,0.005) 0px, rgba(212,175,55,0.005) 2px, transparent 2px, transparent 20px);
      pointer-events: none;
      z-index: -1;
    }

    .site-wrapper {
      max-width: 1440px;
      width: 100%;
      background: transparent;
    }
    /* ========== ROYAL ANIMATIONS ========== */
@keyframes royalFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); filter: drop-shadow(0 10px 15px rgba(212,175,55,0.1)); }
  25% { transform: translateY(-10px) rotate(1deg); filter: drop-shadow(0 20px 25px rgba(212,175,55,0.3)); }
  75% { transform: translateY(10px) rotate(-1deg); filter: drop-shadow(0 20px 25px rgba(212,175,55,0.3)); }
}

@keyframes royalGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(212,175,55,0.2), 0 0 20px rgba(212,175,55,0.1); }
  50% { box-shadow: 0 0 25px rgba(212,175,55,0.5), 0 0 40px rgba(212,175,55,0.3); }
}

@keyframes royalShimmer {
  0% { background-position: -500% 0; }
  100% { background-position: 500% 0; }
}

@keyframes royalSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes royalSpinSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes royalScaleIn {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes royalSlideInLeft {
  0% { opacity: 0; transform: translateX(-50px); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes royalSlideInRight {
  0% { opacity: 0; transform: translateX(50px); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes royalSlideInUp {
  0% { opacity: 0; transform: translateY(50px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes royalSlideInDown {
  0% { opacity: 0; transform: translateY(-50px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes royalRotateIn {
  0% { opacity: 0; transform: rotate(-180deg) scale(0.8); }
  100% { opacity: 1; transform: rotate(0) scale(1); }
}

@keyframes royalBounceIn {
  0% { opacity: 0; transform: scale(0.3); }
  50% { opacity: 1; transform: scale(1.05); }
  70% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

@keyframes royalFlipIn {
  0% { opacity: 0; transform: perspective(1000px) rotateY(90deg); }
  100% { opacity: 1; transform: perspective(1000px) rotateY(0); }
}

@keyframes royalTiltIn {
  0% { opacity: 0; transform: rotateX(-30deg); }
  100% { opacity: 1; transform: rotateX(0); }
}

@keyframes royalZoomInOut {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes royalPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes royalBorderPulse {
  0%, 100% { border-color: rgba(212,175,55,0.2); }
  50% { border-color: rgba(212,175,55,0.8); }
}

@keyframes royalGradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes royalRipple {
  0% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
  70% { box-shadow: 0 0 0 20px rgba(212,175,55,0); }
  100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
}

@keyframes royalWave {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-5px); }
  75% { transform: translateY(5px); }
}

/* Animation Classes */
.animate-royal-float { animation: royalFloat 6s ease-in-out infinite; }
.animate-royal-glow { animation: royalGlow 3s ease-in-out infinite; }
.animate-royal-spin { animation: royalSpinSlow 12s linear infinite; }
.animate-royal-zoom { animation: royalZoomInOut 3s ease-in-out infinite; }
.animate-royal-pulse { animation: royalPulse 2s ease-in-out infinite; }
.animate-royal-border { animation: royalBorderPulse 2s ease-in-out infinite; }
.animate-royal-wave { animation: royalWave 3s ease-in-out infinite; }
.animate-royal-ripple { animation: royalRipple 2s ease-out infinite; }
    /* ========== NAVBAR ROYAL ========== */
.navbar {
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: var(--border-gold);
  border-radius: var(--radius-xxl);
  padding: 0.8rem 2.2rem;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-xl), 0 0 0 1px rgba(212,175,55,0.1) inset;
  animation: royalSlideInDown 1s cubic-bezier(0.23, 1, 0.32, 1);
}

.navbar::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
  animation: royalShimmer 4s infinite;
}

.navbar::after {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, transparent, rgba(212,175,55,0.2), transparent);
  border-radius: var(--radius-xxl);
  z-index: -1;
  opacity: 0;
  transition: opacity 0.5s;
}

.navbar:hover::after {
  opacity: 1;
}

.logo {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  position: relative;
  z-index: 2;
}

.logo-icon {
  width: 55px;
  height: 55px;
  background: var(--gradient-royal);
  border-radius: 18px 6px 18px 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  color: var(--obsidian);
  box-shadow: 0 12px 0 #4a3a1a, 0 15px 30px rgba(0,0,0,0.6);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: royalFloat 5s ease-in-out infinite;
}

.logo-icon:hover {
  transform: rotate(10deg) scale(1.1);
  box-shadow: 0 15px 0 #4a3a1a, 0 20px 40px rgba(212,175,55,0.4);
}

.logo-text {
  position: relative;
}

.logo-text h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #FFFFFF, var(--gold-leaf), #F7E7CE);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  background-size: 200% 200%;
  animation: royalGradientShift 4s ease infinite;
  line-height: 1;
  letter-spacing: -0.5px;
  position: relative;
}

.logo-text h1::before,
.logo-text h1::after {
  content: '✦';
  position: absolute;
  top: 5px;
  font-size: 1.2rem;
  color: var(--gold-leaf);
  opacity: 0;
  transition: all 0.3s;
}

.logo-text h1::before {
  left: -25px;
  transform: translateX(-10px);
}

.logo-text h1::after {
  right: -25px;
  transform: translateX(10px);
}

.logo:hover h1::before,
.logo:hover h1::after {
  opacity: 1;
  transform: translateX(0);
}

.logo-text span {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  display: block;
  margin-top: 2px;
  font-weight: 300;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  position: relative;
  z-index: 2;
}

.nav-item {
  position: relative;
}

.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0.6rem 0;
  transition: all 0.4s;
  position: relative;
}

.nav-links a i {
  color: var(--gold-leaf);
  font-size: 0.9rem;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.4s;
}

.nav-links a:hover {
  color: var(--gold-leaf);
  transform: translateY(-2px);
}

.nav-links a:hover i {
  opacity: 1;
  transform: translateX(0);
}

.nav-links a::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--gradient-royal);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.5s;
}

.nav-links a:hover::before,
.nav-links a.active::before {
  transform: scaleX(1);
  transform-origin: left;
}

.nav-links a.active {
  color: var(--gold-leaf);
}

.nav-links a.active i {
  opacity: 1;
  transform: translateX(0);
}

.user-panel {
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  border: var(--border-gold);
  border-radius: var(--radius-full);
  padding: 0.4rem 0.4rem 0.4rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  position: relative;
  z-index: 2;
  transition: all 0.4s;
  animation: royalGlow 4s ease-in-out infinite;
}

.user-panel:hover {
  background: rgba(40, 40, 40, 0.8);
  border-color: var(--gold-leaf);
  transform: scale(1.02);
  box-shadow: var(--shadow-gold-lg);
}

.user-info {
  display: flex;
  flex-direction: column;
}

.user-name {
  color: var(--text-primary);
  font-weight: 700;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 5px;
}

.user-badge {
  background: var(--gradient-royal);
  color: var(--obsidian);
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-weight: 800;
}

.user-coins {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--gold-leaf);
  font-size: 0.9rem;
  font-weight: 600;
}

.user-avatar {
  width: 45px;
  height: 45px;
  background: var(--gradient-royal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--obsidian);
  font-size: 1.2rem;
  font-weight: 700;
  position: relative;
  overflow: hidden;
}

.user-avatar::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.5), transparent);
  border-radius: 50%;
  animation: royalSpin 4s linear infinite;
}
