      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #030303;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* KARTU UTAMA - RESPONSIF */

      max-width: 1200px;
      width: 100%;
      background: #0a0a0a;

      border-radius: 48px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.98),

                  0 0 25px rgba(184, 150, 44, 0.25);

      transition: all 0.3s ease;
    }

    /* MEDIA QUERY UNTUK HP */

        border-radius: 36px;

      }
    }

    /* MEDIA QUERY UNTUK TABLET */
    @media (min-width: 481px) and (max-width: 768px) {

        padding: 22px 20px;
        border-radius: 42px;
      }
    }

    /* HEADER EMAS ELEGAN */
    .header {
      text-align: center;
      margin-bottom: clamp(15px, 4vw, 30px);
    }

    .header h1 {
      font-size: clamp(2.2rem, 10vw, 4.5rem);
      font-weight: 700;
      letter-spacing: clamp(3px, 2vw, 8px);
      text-transform: uppercase;
      background: linear-gradient(180deg, #f8e3a7, #b8962c, #9e7f29);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(184, 150, 44, 0.4), 0 5px 15px rgba(0,0,0,0.8);
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .gold-underline {
      width: min(250px, 60%);
      height: 3px;
      background: linear-gradient(90deg, transparent, #b8962c, #dbb44b, #b8962c, transparent);
      margin: 8px auto 5px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(184, 150, 44, 0.5);
    }

    .sub {
      color: #c9af67;
      font-weight: 500;
      letter-spacing: clamp(1px, 1.5vw, 3px);
      font-size: clamp(0.75rem, 3vw, 1rem);
      text-transform: uppercase;
      text-shadow: 0 2px 5px black;
      opacity: 0.95;
    }
    /* AREA BENDERA - RESPONSIF SEMPURNA */
.flag-display {
  background: #070707;
  border-radius: clamp(30px, 8vw, 70px);
  padding: clamp(20px, 5vw, 40px) clamp(15px, 4vw, 20px);
  margin-bottom: clamp(15px, 3vw, 25px);
  border: 2px solid #b8962c;
  box-shadow: inset 0 8px 15px rgba(0,0,0,0.9), 0 15px 30px black;
}

.flag-img {
  display: flex;
  justify-content: center;
  align-items: center;
}

.flag-img img {
  width: 100%;
  max-width: min(500px, 90%);
  height: auto;
  aspect-ratio: 3/2;
  object-fit: cover;
  border-radius: clamp(25px, 6vw, 50px);
  box-shadow: 0 20px 35px -10px black, 
              0 0 0 4px #2c2c2c, 
              0 0 0 6px #b8962c,
              0 0 30px rgba(184, 150, 44, 0.4);
  background: #1a1a1a;
  transition: all 0.3s ease;
}

.flag-img img:hover {
  transform: scale(1.01);
  box-shadow: 0 25px 40px -10px black, 
              0 0 0 4px #3a3a3a, 
              0 0 0 6px #dbb44b,
              0 0 45px rgba(219, 180, 75, 0.6);
}

/* PANEL INTERAKSI */
.interaction-panel {
  background: #0c0c0c;
  border-radius: clamp(35px, 8vw, 80px);
  padding: clamp(22px, 5vw, 35px) clamp(18px, 4vw, 35px);
  margin: 8px 0 12px;
  border: 2px solid #b8962c;
  box-shadow: 0 12px 25px -5px black, 0 0 0 1.5px #b8962c inset;
}

/* AREA INPUT DAN TOMBOL - FLEX WRAP RAPI */
.guess-area {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: clamp(10px, 2.5vw, 15px);
  margin-bottom: clamp(18px, 4vw, 25px);
}

.guess-input {
  flex: 3 1 min(280px, 100%);
  background: #151515;
  border: 2.5px solid #6b582a;
  border-radius: 60px;
  padding: clamp(14px, 3.5vw, 18px) clamp(20px, 5vw, 30px);
  font-size: clamp(1rem, 4vw, 1.3rem);
  color: #ffffff;
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.9);
  width: 100%;
}

.guess-input:focus {
  border-color: #dbb44b;
  background: #1c1c1c;
  box-shadow: 0 0 0 3px rgba(184, 150, 44, 0.25), inset 0 2px 8px black;
}

.guess-input::placeholder {
  color: #7d6a3a;
  font-style: normal;
  letter-spacing: 0.5px;
  font-weight: 400;
  font-size: clamp(0.9rem, 3.5vw, 1.1rem);
}

.btn {
  background: #1f1b0e;
  border: none;
  border-radius: 60px;
  padding: clamp(14px, 3.5vw, 18px) clamp(25px, 6vw, 40px);
  font-size: clamp(1rem, 4vw, 1.3rem);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: clamp(1.5px, 1vw, 3px);
  color: #dbb44b;
  border: 2px solid #b8962c;
  box-shadow: 0 7px 0 #0f0d06, 0 12px 20px black;
  cursor: pointer;
  transition: 0.08s linear;
  background: linear-gradient(145deg, #262012, #151107);
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(4px);
  box-shadow: 0 3px 0 #0f0d06, 0 12px 25px black;
  background: #2f2816;
  color: #f0cf6c;
  border-color: #dbb44b;
}

.btn:active {
  transform: translateY(7px);
  box-shadow: 0 1px 0 #0f0d06, 0 10px 20px black;
}

/* MEDIA QUERY KHUSUS HP UNTUK TOMBOL */
@media (max-width: 480px) {
  .btn {
    width: 100%;
    white-space: normal;
  }
  .guess-input {
    text-align: center;
  }
}
        /* HINT BOX - WARNA EMAS ELEGAN */

      justify-content: flex-end;
      margin: 20px 0 8px;
      padding: 0 3px;

      border-radius: 50px;
      padding: clamp(10px, 2.5vw, 15px) clamp(20px, 5vw, 35px);
      border: 2px solid #b8962c;
      box-shadow: 0 0 15px rgba(184, 150, 44, 0.2), inset 0 0 8px black;

      display: inline-flex;
      align-items: center;
      gap: clamp(8px, 2vw, 15px);
      flex-wrap: wrap;
      justify-content: flex-end;
    }

      font-weight: 800;
      color: #dbb44b;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      text-shadow: 0 0 15px #b8962c, 0 0 25px #9e7f29;

      text-align: center;
      font-size: clamp(1rem, 3.8vw, 1.3rem);
      margin: 15px 0 5px;
      min-height: clamp(2.5rem, 8vw, 3rem);
      font-weight: 600;
      padding: 0 5px;
    }

    .success-msg {
      color: #b8d9a0;
      text-shadow: 0 0 8px #3a6b2d, 0 0 12px #2b7a1a;
    }
    .error-msg {
      color: #e8b89b;
      text-shadow: 0 0 8px #a64d1a, 0 0 12px #b34f1a;
    }

    .footer {
      text-align: center;
      color: #a38d4b;
      margin-top: 20px;
      font-size: clamp(0.7rem, 3vw, 0.95rem);
      border-top: 1.5px solid #5c4f29;
      padding-top: 18px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* Tweak tambahan untuk tablet */
    @media (min-width: 768px) and (max-width: 1024px) {
      .game-container {
        max-width: 900px;
      }
      .flag-img img {
        max-width: 450px;
      }
    }
  </style>
</head>

  let remainingItems = [];
  let currentFlag = null;

  const flagImg = document.getElementById('flagImage');
  const guessInput = document.getElementById('guessInput');
  const submitBtn = document.getElementById('submitGuess');
  const hintBtn = document.getElementById('hintBtn');

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    remainingItems = countries.map(c => ({ code: c.code, name: c.name }));
    remainingItems = shuffleArray(remainingItems);
    pickNewFlag();
    updateRemainingCounter();
    messageArea.innerHTML = '';
  }

  function pickNewFlag() {
    if (remainingItems.length === 0) {
      currentFlag = null;
      flagImg.src = '';
      flagImg.alt = 'Selesai!';
      hintDisplay.innerText = '✨ SELESAI! SEMUA BENDERA TERBAK ✨';
      return;
    }
    const randomIndex = Math.floor(Math.random() * remainingItems.length);
    currentFlag = { ...remainingItems[randomIndex] };
    flagImg.src = `${FLAG_BASE}${currentFlag.code}.png`;
    flagImg.alt = `bendera ${currentFlag.name}`;
    hintDisplay.innerText = '👑 TEKAN HINT UNTUK PETUNJUK';
    guessInput.value = '';
    messageArea.innerHTML = '';
  }

  function updateRemainingCounter() {
    remainingSpan.innerText = remainingItems.length;
  }

  function removeCurrentFromRemaining() {
    if (!currentFlag) return;
    remainingItems = remainingItems.filter(item => item.code !== currentFlag.code);
  }

    if (!currentFlag) {
      hintDisplay.innerText = '🏁 GAME SELESAI';

    const name = currentFlag.name;
    if (name.length <= 3) {
      hintDisplay.innerText = `🔎 HINT: ${name}`;
    } else {
      hintDisplay.innerText = `🔎 HINT: ${name.substring(0, 3)}...${name.substring(name.length - 2)}`;
    }
  }

  function handleGuess() {
    if (!currentFlag) {
      messageArea.innerHTML = '<span class="success-msg">✨ SEMUA BENDERA TERBAK ✨</span>';
      return;
    }

    const userAnswer = guessInput.value.trim().toLowerCase();
    if (userAnswer === '') {
      messageArea.innerHTML = '<span class="error-msg">⚠️ MASUKKAN NAMA NEGARA</span>';
      return;
    }

    if (userAnswer === currentFlag.name.toLowerCase()) {
      messageArea.innerHTML = '<span class="success-msg">✓ BENAR! BENDERA DIHAPUS</span>';
      removeCurrentFromRemaining();
      updateRemainingCounter();

      if (remainingItems.length > 0) {
        pickNewFlag();
      } else {
        currentFlag = null;
        flagImg.src = '';
        hintDisplay.innerText = '🏁 GAME COMPLETE 🏁';
        messageArea.innerHTML = '<span class="success-msg">🎉 SELAMAT! ANDA MENANG 🎉</span>';
        remainingSpan.innerText = '0';
      }
    } else {
      messageArea.innerHTML = '<span class="error-msg">✗ SALAH! COBA LAGI (DIACAK ULANG)</span>';
      if (remainingItems.length > 0) {
        pickNewFlag();
      }
    }
  }

  submitBtn.addEventListener('click', handleGuess);
  hintBtn.addEventListener('click', showHint);
  guessInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitBtn.click();
  });

  initGame();
})();
</script>
</body>
</html>
