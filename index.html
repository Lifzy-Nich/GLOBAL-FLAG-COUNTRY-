      border: 2px solid #c9a43b;

      border-radius: 40px;
      box-shadow: 0 25px 40px -10px black,

.interaction-panel {
  background: #0c0c0c;

  margin: 25px 0 20px;
}

  box-shadow: 0 8px 0 #0a0702, 0 12px 25px black;

  letter-spacing: 0.5px;
  word-break: break-word;
  border: 2px solid #b28f2f;
}

  transform: translateY(4px);
  box-shadow: 0 4px 0 #0a0702, 0 12px 25px black;
  background: #222222;
  color: #f8e09c;
  border-color: #f5d97a;
}

  box-shadow: 0 2px 0 #0a0702, 0 8px 20px black;
}

  color: #ffd6d6;
  box-shadow: 0 0 30px #8c3f3f, 0 6px 0 #4d0f0f;
  transform: translateY(2px);
}

  opacity: 0.8;
  cursor: not-allowed;
}

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Ambil 3 pilihan acak (selain jawaban benar)
  function getRandomOptions(correctName, count = 3) {
    const otherCountries = remainingItems

      .map(item => item.name);

    return shuffled.slice(0, count);

    const correctName = currentFlag.name;
    const wrongNames = getRandomOptions(correctName, 3);
    
    options = [correctName, ...wrongNames];
    options = shuffleArray(options);
    
    optionBtns.forEach((btn, index) => {
      btn.textContent = options[index] || '-';
    });
  }

  // Inisialisasi game
  function initGame() {
    remainingItems = countries.map(c => ({ code: c.code, name: c.name }));
    remainingItems = shuffleArray(remainingItems);
    pickNewFlag();
    messageArea.innerHTML = '';
    resetForNewQuestion();
  }

  // Ambil bendera baru
  function pickNewFlag() {
    if (remainingItems.length === 0) {
      currentFlag = null;
      flagImg.src = '';
      flagImg.alt = 'Selesai!';
      hintDisplay.innerText = '✨ SELESAI! SEMUA BENDERA TERBAK ✨';
      optionBtns.forEach(btn => {
        btn.textContent = '-';
        btn.disabled = true;
      });
      nextBtn.classList.add('hidden');
      return;
    }
    
    const randomIndex = Math.floor(Math.random() * remainingItems.length);
    currentFlag = { ...remainingItems[randomIndex] };
    flagImg.src = `${FLAG_BASE}${currentFlag.code}.png`;
    flagImg.alt = `bendera ${currentFlag.name}`;
    hintDisplay.innerText = '👑 TEKAN HINT UNTUK PETUNJUK';
    messageArea.innerHTML = '';
    
    resetForNewQuestion();
    prepareOptions();
  }

  function removeCurrentFromRemaining() {
    if (!currentFlag) return;
    remainingItems = remainingItems.filter(item => item.code !== currentFlag.code);
  }

  function showHint() {
    if (!currentFlag) {
      hintDisplay.innerText = '🏁 GAME SELESAI';
      return;
    }
    const name = currentFlag.name;
    if (name.length <= 3) {
      hintDisplay.innerText = `🔎 HINT: ${name}`;
    } else {
      hintDisplay.innerText = `🔎 HINT: ${name.substring(0, 3)}...${name.substring(name.length - 2)}`;
    }
  }

  // Proses jawaban
  function handleAnswer(selectedIndex) {
    if (answered || !currentFlag) return;
    
    const selectedAnswer = options[selectedIndex];
    const isCorrect = (selectedAnswer === currentFlag.name);
    
    optionBtns.forEach(btn => { btn.disabled = true; });
    
    if (isCorrect) {
      optionBtns[selectedIndex].classList.add('selected-correct');
      messageArea.innerHTML = '<span class="success-msg">✓ BENAR! BENDERA DIHAPUS</span>';
      
      removeCurrentFromRemaining();
      
      if (remainingItems.length === 0) {
        currentFlag = null;
        flagImg.src = '';
        hintDisplay.innerText = '🏁 GAME COMPLETE 🏁';
        messageArea.innerHTML = '<span class="success-msg">🎉 SELAMAT! ANDA MENANG 🎉</span>';
        nextBtn.classList.add('hidden');
        return;
      }
    } else {
      optionBtns[selectedIndex].classList.add('selected-wrong');
      
      const correctIndex = options.indexOf(currentFlag.name);
      if (correctIndex !== -1) {
        optionBtns[correctIndex].classList.add('selected-correct');
      }
      
      messageArea.innerHTML = '<span class="error-msg">✗ SALAH! KLIK "BERIKUTNYA"</span>';
    }
    
    answered = true;
    nextBtn.classList.remove('hidden');
  }

  // Event Listeners
  optionBtns.forEach((btn, index) => {
    btn.addEventListener('click', () => handleAnswer(index));
  });

  hintBtn.addEventListener('click', showHint);

  nextBtn.addEventListener('click', () => {
    if (remainingItems.length > 0) {
      pickNewFlag();
    } else {
      nextBtn.classList.add('hidden');
    }
  });

  // Mulai game
  initGame();
})();
</script>
</body>
</html>
