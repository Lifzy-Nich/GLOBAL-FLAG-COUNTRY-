<html lang="en">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #030303;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* KARTU UTAMA - HITAM GLOSSY */
    .game-container {
      max-width: 1200px;
      width: 100%;
      background: #0a0a0a;
      background: linear-gradient(165deg, #0d0d0d 0%, #080808 100%);
      border: 2px solid #b8962c;
      border-radius: 48px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.98), 
                  0 0 0 2px #b8962c inset,
                  0 0 25px rgba(184, 150, 44, 0.25);
      padding: 25px 22px;
      transition: all 0.3s ease;
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 18px 15px;
        border-radius: 36px;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .game-container {
        padding: 22px 20px;
        border-radius: 42px;
      }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: clamp(15px, 4vw, 30px);
    }

    .header h1 {
      font-size: clamp(2.2rem, 10vw, 4.5rem);
      font-weight: 700;
      letter-spacing: clamp(3px, 2vw, 8px);
      text-transform: uppercase;
      background: linear-gradient(180deg, #f8e3a7, #b8962c, #9e7f29);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(184, 150, 44, 0.4), 0 5px 15px rgba(0,0,0,0.8);
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .gold-underline {
      width: min(250px, 60%);
      height: 3px;
      background: linear-gradient(90deg, transparent, #b8962c, #dbb44b, #b8962c, transparent);
      margin: 8px auto 5px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(184, 150, 44, 0.5);
    }

    .sub {
      color: #c9af67;
      font-weight: 500;
      letter-spacing: clamp(1px, 1.5vw, 3px);
      font-size: clamp(0.75rem, 3vw, 1rem);
      text-transform: uppercase;
      text-shadow: 0 2px 5px black;
      opacity: 0.95;
    }

    /* AREA BENDERA */
    .flag-display {
      background: #070707;
      border-radius: clamp(30px, 8vw, 70px);
      padding: clamp(20px, 5vw, 40px) clamp(15px, 4vw, 20px);
      margin-bottom: clamp(15px, 3vw, 25px);
      border: 2px solid #b8962c;
      box-shadow: inset 0 8px 15px rgba(0,0,0,0.9), 0 15px 30px black;
    }

    .flag-img {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .flag-img img {
      width: 100%;
      max-width: min(500px, 90%);
      height: auto;
      aspect-ratio: 3/2;
      object-fit: cover;
      border-radius: clamp(25px, 6vw, 50px);
      box-shadow: 0 20px 35px -10px black, 
                  0 0 0 4px #2c2c2c, 
                  0 0 0 6px #b8962c,
                  0 0 30px rgba(184, 150, 44, 0.4);
      background: #1a1a1a;
      transition: all 0.3s ease;
    }
    /* PANEL INTERAKSI */
.interaction-panel {
  background: #0c0c0c;
  border-radius: clamp(35px, 8vw, 80px);
  padding: clamp(22px, 5vw, 35px) clamp(18px, 4vw, 35px);
  margin: 8px 0 12px;
  border: 2px solid #b8962c;
  box-shadow: 0 12px 25px -5px black, 0 0 0 1.5px #b8962c inset;
}

/* ===== AREA PILIHAN GANDA ===== */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  flex-wrap: wrap;
  gap: 15px;
}

.quiz-title {
  color: #dbb44b;
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  background: #1a1509;
  padding: 10px 25px;
  border-radius: 50px;
  border: 1px solid #b8962c;
}

.options-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(12px, 2.5vw, 18px);
  margin: 25px 0 20px;
}

/* TOMBOL PILIHAN */
.option-btn {
  background: #16130a;
  border: 2.5px solid #6b582a;
  border-radius: 60px;
  padding: clamp(16px, 3.5vw, 22px) 15px;
  font-size: clamp(1rem, 3.8vw, 1.3rem);
  font-weight: 600;
  color: #ead18b;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 6px 0 #0f0d06, 0 8px 18px black;
  text-transform: capitalize;
  letter-spacing: 0.5px;
  border: 2px solid #8f782f;
  width: 100%;
  word-break: break-word;
}

.option-btn:hover:not(:disabled) {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #0f0d06, 0 8px 18px black;
  background: #221e10;
  color: #f0cf6c;
  border-color: #dbb44b;
}

.option-btn:active:not(:disabled) {
  transform: translateY(5px);
  box-shadow: 0 1px 0 #0f0d06, 0 5px 12px black;
}

.option-btn.selected-correct {
  background: #2c5a2c;
  border-color: #8bc34a;
  color: white;
  box-shadow: 0 0 20px #4caf50;
  transform: scale(1.02);
}

.option-btn.selected-wrong {
  background: #6b2f2f;
  border-color: #d45d5d;
  color: #ffcdcd;
  box-shadow: 0 0 20px #b71c1c;
  opacity: 0.9;
}

.option-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* HINT BOX (TETAP ADA) */
.hint-box {
  background: #0f0d07;
  border-radius: 60px;
  padding: clamp(15px, 3.5vw, 20px) clamp(20px, 4vw, 35px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 15px;
  border: 2px solid #9e872f;
  box-shadow: inset 0 3px 6px #000000, 0 8px 18px black;
  margin-top: 20px;
}

.hint-text {
  color: #ead7a2;
  font-size: clamp(1rem, 3.8vw, 1.4rem);
  font-weight: 500;
  background: #1a160b;
  padding: clamp(10px, 2.5vw, 12px) clamp(20px, 5vw, 35px);
  border-radius: 50px;
  border-left: 6px solid #b8962c;
  box-shadow: inset 0 2px 6px black;
  flex: 2 1 min(280px, 100%);
  letter-spacing: 0.3px;
  word-break: break-word;
}

.hint-btn {
  background: #181407;
  border: 2.5px solid #b8962c;
  color: #ead18b;
  padding: clamp(12px, 3vw, 14px) clamp(25px, 6vw, 40px);
  border-radius: 50px;
  font-size: clamp(1.1rem, 4vw, 1.3rem);
  font-weight: 700;
  box-shadow: 0 0 18px rgba(184, 150, 44, 0.3);
  transition: 0.2s;
  cursor: pointer;
  backdrop-filter: blur(4px);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  white-space: nowrap;
}

.hint-btn:hover {
  background: #b8962c;
  color: #0a0802;
  border-color: #f0d070;
  box-shadow: 0 0 35px rgba(184, 150, 44, 0.7);
}

@media (max-width: 600px) {
  .hint-box {
    flex-direction: column;
    align-items: stretch;
  }
  .hint-btn {
    width: 100%;
    white-space: normal;
  }
}
        /* STATS DI POJOK KANAN */
    .stats-bar {

      justify-content: flex-end;
      margin: 25px 0 5px;

      display: inline-flex;
      align-items: center;

      text-shadow: 0 0 15px #b8962c, 0 0 25px #9e7f29;

      font-size: clamp(1rem, 3.8vw, 1.3rem);

      color: #e8b89b;
      text-shadow: 0 0 8px #a64d1a, 0 0 12px #b34f1a;

      justify-content: center;

    .next-btn {

      border: 2.5px solid #b8962c;
      color: #dbb44b;
      padding: clamp(14px, 3.5vw, 18px) clamp(35px, 8vw, 60px);
      border-radius: 60px;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 7px 0 #0f0d06, 0 12px 25px black;
      transition: 0.08s linear;
      width: fit-content;
      min-width: 200px;
    }

    .next-btn:hover {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #0f0d06, 0 12px 25px black;
      background: #2f2816;
      color: #f0cf6c;
      border-color: #dbb44b;
    }

    .next-btn:active {
      transform: translateY(7px);
      box-shadow: 0 1px 0 #0f0d06, 0 8px 18px black;
    }

    .next-btn.hidden {
      display: none;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      color: #a38d4b;
      margin-top: 20px;
      font-size: clamp(0.7rem, 3vw, 0.95rem);
      border-top: 1.5px solid #5c4f29;
      padding-top: 18px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* RESPONSIVE UNTUK GRID OPSI */
    @media (max-width: 480px) {
      .options-container {
        grid-template-columns: 1fr; /* Di HP jadi 1 kolom */
        gap: 10px;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .options-container {
        grid-template-columns: repeat(2, 1fr); /* Tablet tetap 2 kolom */
      }
    }
  </style>
</head>

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Ambil 3 pilihan acak (selain jawaban benar)
  function getRandomOptions(correctName, count = 3) {
    const otherCountries = remainingItems
      .filter(item => item.name !== correctName)
      .map(item => item.name);
    
    // Acak dan ambil 3 (atau kurang jika sisa sedikit)
    const shuffled = shuffleArray([...otherCountries]);
    return shuffled.slice(0, count);
  }

  // Reset state untuk pertanyaan baru
  function resetForNewQuestion() {
    answered = false;
    nextBtn.classList.add('hidden');
    
    // Enable semua tombol dan reset class
    optionBtns.forEach(btn => {
      btn.disabled = false;
      btn.classList.remove('selected-correct', 'selected-wrong');
    });
  }

  // Siapkan 4 pilihan (1 benar + 3 salah acak)
  function prepareOptions() {
    if (!currentFlag) return;
    
    const correctName = currentFlag.name;
    const wrongNames = getRandomOptions(correctName, 3);
    
    // Gabungkan benar + salah, lalu acak
    options = [correctName, ...wrongNames];
    options = shuffleArray(options);
    
    // Tampilkan ke tombol
    optionBtns.forEach((btn, index) => {
      btn.textContent = options[index] || '-';
    });
  }

  // Inisialisasi game
  function initGame() {
    remainingItems = countries.map(c => ({ code: c.code, name: c.name }));
    remainingItems = shuffleArray(remainingItems);
    pickNewFlag();
    updateRemainingCounter();
    messageArea.innerHTML = '';
    resetForNewQuestion();
  }

  // Ambil bendera baru
  function pickNewFlag() {
    if (remainingItems.length === 0) {
      currentFlag = null;
      flagImg.src = '';
      flagImg.alt = 'Selesai!';
      hintDisplay.innerText = '✨ SELESAI! SEMUA BENDERA TERBAK ✨';
      optionBtns.forEach(btn => {
        btn.textContent = '-';
        btn.disabled = true;
      });
      return;
    }
    
    const randomIndex = Math.floor(Math.random() * remainingItems.length);
    currentFlag = { ...remainingItems[randomIndex] };
    flagImg.src = `${FLAG_BASE}${currentFlag.code}.png`;
    flagImg.alt = `bendera ${currentFlag.name}`;
    hintDisplay.innerText = '👑 TEKAN HINT UNTUK PETUNJUK';
    messageArea.innerHTML = '';
    
    resetForNewQuestion();
    prepareOptions();
  }

  function updateRemainingCounter() {
    remainingSpan.innerText = remainingItems.length;
  }

  function removeCurrentFromRemaining() {
    if (!currentFlag) return;
    remainingItems = remainingItems.filter(item => item.code !== currentFlag.code);
  }

  function showHint() {
    if (!currentFlag) {
      hintDisplay.innerText = '🏁 GAME SELESAI';
      return;
    }
    const name = currentFlag.name;
    if (name.length <= 3) {
      hintDisplay.innerText = `🔎 HINT: ${name}`;
    } else {
      hintDisplay.innerText = `🔎 HINT: ${name.substring(0, 3)}...${name.substring(name.length - 2)}`;
    }
  }

  // Proses jawaban (dipanggil saat tombol opsi diklik)
  function handleAnswer(selectedIndex) {
    if (answered || !currentFlag) return;
    
    const selectedAnswer = options[selectedIndex];
    const isCorrect = (selectedAnswer === currentFlag.name);
    
    // Disable semua tombol
    optionBtns.forEach(btn => { btn.disabled = true; });
    
    if (isCorrect) {
      // BENAR
      optionBtns[selectedIndex].classList.add('selected-correct');
      messageArea.innerHTML = '<span class="success-msg">✓ BENAR! BENDERA DIHAPUS</span>';
      
      // Hapus dari daftar
      removeCurrentFromRemaining();
      updateRemainingCounter();
      
      if (remainingItems.length === 0) {
        // Game selesai
        currentFlag = null;
        flagImg.src = '';
        hintDisplay.innerText = '🏁 GAME COMPLETE 🏁';
        messageArea.innerHTML = '<span class="success-msg">🎉 SELAMAT! ANDA MENANG 🎉</span>';
        remainingSpan.innerText = '0';
        nextBtn.classList.add('hidden');
        return;
      }
    } else {
      // SALAH
      optionBtns[selectedIndex].classList.add('selected-wrong');
      
      // Tandai jawaban benar (untuk pembelajaran)
      const correctIndex = options.indexOf(currentFlag.name);
      if (correctIndex !== -1) {
        optionBtns[correctIndex].classList.add('selected-correct');
      }
      
      messageArea.innerHTML = '<span class="error-msg">✗ SALAH! KLIK "BERIKUTNYA" UNTUK COBA LAGI</span>';
    }
    
    answered = true;
    nextBtn.classList.remove('hidden');
  }

  // Event Listeners
  optionBtns.forEach((btn, index) => {
    btn.addEventListener('click', () => handleAnswer(index));
  });

  hintBtn.addEventListener('click', showHint);

  nextBtn.addEventListener('click', () => {
    if (remainingItems.length > 0) {
      pickNewFlag(); // Ambil bendera baru (acak)
    } else {
      nextBtn.classList.add('hidden');
    }
  });

  // Mulai game
  initGame();
})();
</script>
</body>
</html>
