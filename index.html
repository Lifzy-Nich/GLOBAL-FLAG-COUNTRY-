<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOBAL FLAG · tebak bendera</title>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .game-container {
      max-width: 1100px;
      width: 100%;
      background: linear-gradient(145deg, #1a1a1a 0%, #101010 100%);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 48px;
      box-shadow: 0 25px 45px -10px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 55, 0.2) inset, 0 0 20px rgba(212, 175, 55, 0.1);
      backdrop-filter: blur(2px);
      padding: 30px 25px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .header h1 {
      font-size: 3.2rem;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f5e7b2 0%, #d4af37 60%, #f5e7b2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 4px 8px rgba(0,0,0,0.7);
      margin-bottom: 8px;
    }

    .gold-underline {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, #f5e7b2, #d4af37, transparent);
      margin: 8px auto 0;
      border-radius: 4px;
      box-shadow: 0 0 12px #d4af37;
    }

    .sub {
      color: #888;
      font-weight: 300;
      letter-spacing: 2px;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .flag-display {
      background: #0d0d0d;
      border-radius: 48px;
      padding: 40px 20px;
      margin-bottom: 30px;
      border: 1px solid #2a2a2a;
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.8), 0 20px 30px -12px black;
    }

    .flag-img {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .flag-img img {
      width: 100%;
      max-width: 420px;
      height: auto;
      aspect-ratio: 3/2;
      object-fit: cover;
      border-radius: 32px;
      box-shadow: 0 20px 30px -8px black, 0 0 0 3px #2c2c2c, 0 0 0 6px #1b1b1b, 0 0 0 1px #d4af37 inset;
      background: #1e1e1e;
      transition: transform 0.2s ease;
    }

    .flag-img img:hover {
      transform: scale(1.01);
      box-shadow: 0 25px 35px -10px black, 0 0 0 3px #3a3a3a, 0 0 0 6px #d4af37, 0 0 25px #d4af37;
    }

    .interaction-panel {
      background: rgba(10, 10, 10, 0.7);
      border-radius: 60px;
      padding: 28px 32px;
      margin: 20px 0 20px;
      backdrop-filter: blur(4px);
      border: 1px solid #2f2f2f;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.8), 0 0 0 1px #3f3f3f inset;
    }
    .guess-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .guess-input {
      flex: 3 1 260px;
      background: #1b1b1b;
      border: 2px solid #3c3c3c;
      border-radius: 60px;
      padding: 16px 28px;
      font-size: 1.2rem;
      color: #ececec;
      font-weight: 400;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.7);
    }

    .guess-input:focus {
      border-color: #d4af37;
      background: #121212;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3), inset 0 2px 8px black;
    }

    .guess-input::placeholder {
      color: #6b6b6b;
      font-style: italic;
      letter-spacing: 1px;
    }

    .btn {
      background: #232323;
      border: none;
      border-radius: 60px;
      padding: 16px 34px;
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #e0c87c;
      border: 1px solid #5a4a28;
      box-shadow: 0 8px 0 #0a0a0a, 0 10px 18px black;
      cursor: pointer;
      transition: 0.08s linear;
      background: linear-gradient(145deg, #2a2a2a, #181818);
    }

    .btn:hover {
      transform: translateY(3px);
      box-shadow: 0 4px 0 #0a0a0a, 0 10px 20px black;
      background: #2d2d2d;
      color: #f5db7e;
      border-color: #d4af37;
    }

    .btn:active {
      transform: translateY(7px);
      box-shadow: 0 1px 0 #0a0a0a, 0 8px 16px black;
    }

    .hint-box {
      background: #0e0e0e;
      border-radius: 48px;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      border: 1px solid #3f3f3f;
      box-shadow: inset 0 2px 5px #000000;
    }

    .hint-text {
      color: #c9c9c9;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      background: #1c1c1c;
      padding: 10px 25px;
      border-radius: 40px;
      border-left: 5px solid #d4af37;
      box-shadow: inset 0 2px 5px black;
      flex: 2 1 300px;
    }

    .hint-btn {
      background: transparent;
      border: 2px solid #d4af37;
      color: #d4af37;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
      transition: 0.2s;
      cursor: pointer;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(5px);
    }

    .hint-btn:hover {
      background: #d4af37;
      color: #111;
      border-color: #f5e7b2;
      box-shadow: 0 0 30px #d4af37;
    }

    .stats-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 25px;
      padding: 0 15px;
    }

    .remaining-badge {
      background: #1e1e1e;
      border-radius: 60px;
      padding: 12px 32px;
      border: 1px solid #4f4f4f;
      box-shadow: inset 0 0 8px black;
      color: #ecd88b;
      font-size: 1.2rem;
      font-weight: 400;
    }

    .remaining-badge span {
      font-weight: 700;
      color: #d4af37;
      font-size: 1.8rem;
      margin-left: 12px;
      text-shadow: 0 0 15px gold;
    }

    .message {
      text-align: center;
      font-size: 1.2rem;
      margin: 10px 0 0;
      min-height: 2.8rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .success-msg {
      color: #a5d6a5;
      text-shadow: 0 0 5px #0f4d0f;
    }
    .error-msg {
      color: #e0a78b;
      text-shadow: 0 0 5px #8b3c2b;
    }

    .footer {
      text-align: center;
      color: #5a5a5a;
      margin-top: 18px;
      font-size: 0.9rem;
      border-top: 1px dashed #3f3f3f;
      padding-top: 18px;
    }
  </style>
</head>

  // State management
  let remainingItems = [];
  let currentFlag = null;

  const flagImg = document.getElementById('flagImage');
  const guessInput = document.getElementById('guessInput');
  const submitBtn = document.getElementById('submitGuess');
  const hintBtn = document.getElementById('hintBtn');
  const hintDisplay = document.getElementById('hintDisplay');
  const messageArea = document.getElementById('messageArea');
  const remainingSpan = document.getElementById('remainingCount');

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    remainingItems = countries.map(c => ({ code: c.code, name: c.name }));
    remainingItems = shuffleArray(remainingItems);
    pickNewFlag();
    updateRemainingCounter();
    messageArea.innerHTML = '';
    messageArea.className = 'message';
  }

  function pickNewFlag() {
    if (remainingItems.length === 0) {
      currentFlag = null;
      flagImg.src = '';
      flagImg.alt = 'Selesai! Semua bendera sudah ditebak.';
      hintDisplay.innerText = '✨ SELESAI! semua bendera telah ditebak. ✨';
      return;
    }
    const randomIndex = Math.floor(Math.random() * remainingItems.length);
    currentFlag = { ...remainingItems[randomIndex] };
    flagImg.src = `${FLAG_BASE}${currentFlag.code}.png`;
    flagImg.alt = `bendera ${currentFlag.name}`;
    hintDisplay.innerText = '👑 klik hint untuk petunjuk';
    guessInput.value = '';
    messageArea.innerHTML = '';
  }

  function updateRemainingCounter() {
    remainingSpan.innerText = remainingItems.length;
  }

  function removeCurrentFromRemaining() {
    if (!currentFlag) return;
    remainingItems = remainingItems.filter(item => item.code !== currentFlag.code);
  }

  function showHint() {
    if (!currentFlag) {
      hintDisplay.innerText = '🎉 semua sudah ditebak, tidak ada hint';
      return;
    }
    const name = currentFlag.name;
    if (name.length <= 3) {
      hintDisplay.innerText = `🔎 petunjuk: ${name}`;
    } else {
      const partial = name.substring(0, 3) + '...' + name.substring(name.length - 2);
      hintDisplay.innerText = `🔎 petunjuk: ${partial}`;
    }
  }

  function handleGuess() {
    if (!currentFlag) {
      messageArea.innerHTML = '<span class="success-msg">✨ Anda telah menebak semua bendera! ✨</span>';
      return;
    }

    const userAnswer = guessInput.value.trim().toLowerCase();
    if (userAnswer === '') {
      messageArea.innerHTML = '<span class="error-msg">✱ ketik nama negara</span>';
      return;
    }

    if (userAnswer === currentFlag.name.toLowerCase()) {
      messageArea.innerHTML = '<span class="success-msg">✓ BENAR! bendera ini tidak akan muncul lagi.</span>';
      removeCurrentFromRemaining();
      updateRemainingCounter();

      if (remainingItems.length > 0) {
        pickNewFlag();
      } else {
        currentFlag = null;
        flagImg.src = '';
        flagImg.alt = 'Selesai!';
        hintDisplay.innerText = '🏁 GAME COMPLETE 🏁';
        messageArea.innerHTML = '<span class="success-msg">SELAMAT! Semua bendera telah ditebak.</span>';
        remainingSpan.innerText = '0';
      }
    } else {
      messageArea.innerHTML = '<span class="error-msg">✗ SALAH, coba lagi (pertanyaan akan diacak ulang)</span>';
      if (remainingItems.length > 0) {
        pickNewFlag();
      }
    }
  }

  submitBtn.addEventListener('click', handleGuess);
  hintBtn.addEventListener('click', () => {
    if (!currentFlag && remainingItems.length === 0) {
      hintDisplay.innerText = '🏁 permainan selesai';
    } else if (!currentFlag && remainingItems.length > 0) {
      pickNewFlag();
      showHint();
    } else {
      showHint();
    }
  });

  guessInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      submitBtn.click();
    }
  });

  initGame();
})();
