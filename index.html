<!DOCTYPE html>
<html lang="en">

  <title>GLOBAL FLAG · TEBAK BENDERA</title>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* KARTU UTAMA - HITAM GLOSSY DENGAN EMAS */
    .game-container {
      max-width: 1000px;
      width: 100%;
      background: #0c0c0c;
      background-image: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
      border: 2px solid #d4af37;
      border-radius: 60px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.95), 
                  0 0 0 2px #d4af37 inset,
                  0 0 30px rgba(212, 175, 55, 0.5);
      padding: 35px 30px;
    }

    /* HEADER EMAS MEWAH */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff3c9, #d4af37, #b8860b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #ffd700, 0 5px 10px black;
      margin-bottom: 5px;
    }

    .gold-underline {
      width: 250px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #d4af37, #ffd700, #d4af37, transparent);
      margin: 10px auto 5px;
      border-radius: 10px;
      box-shadow: 0 0 25px gold;
    }

    .sub {
      color: #b9a25a;
      font-weight: 500;
      letter-spacing: 3px;
      font-size: 1rem;
      text-transform: uppercase;
      text-shadow: 0 2px 5px black;
    }
    /* AREA BENDERA - ELEGAN DAN BESAR */
.flag-display {
  background: #050505;
  border-radius: 70px;
  padding: 40px 20px;
  margin-bottom: 25px;
  border: 3px solid #d4af37;
  box-shadow: inset 0 10px 20px rgba(0,0,0,0.9), 0 20px 40px black;
}

.flag-img {
  display: flex;
  justify-content: center;
  align-items: center;
}

.flag-img img {
  width: 100%;
  max-width: 500px;
  height: auto;
  aspect-ratio: 3/2;
  object-fit: cover;
  border-radius: 50px;
  box-shadow: 0 25px 40px -10px black, 
              0 0 0 5px #2c2c2c, 
              0 0 0 8px #d4af37,
              0 0 50px #ffd700;
  background: #1e1e1e;
  transition: all 0.3s ease;
}

.flag-img img:hover {
  transform: scale(1.02);
  box-shadow: 0 30px 50px -10px black, 
              0 0 0 5px #3a3a3a, 
              0 0 0 8px #ffd700,
              0 0 70px gold;
}

/* PANEL INTERAKSI - BACKGROUND GLOSSY */
.interaction-panel {
  background: #111111;
  border-radius: 80px;
  padding: 35px 35px;
  margin: 10px 0 15px;
  border: 2px solid #d4af37;
  box-shadow: 0 15px 30px -5px black, 0 0 0 2px #ffd700 inset;
}

/* AREA INPUT DAN TOMBOL - SUSUNAN RAPI */
.guess-area {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.guess-input {
  flex: 3 1 300px;
  background: #1f1f1f;
  border: 3px solid #4a3e1f;
  border-radius: 70px;
  padding: 18px 30px;
  font-size: 1.3rem;
  color: #ffffff;
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
  box-shadow: inset 0 5px 10px rgba(0,0,0,0.9);
}

.guess-input:focus {
  border-color: #ffd700;
  background: #0f0f0f;
  box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.4), inset 0 2px 10px black;
}

.guess-input::placeholder {
  color: #8a7a4a;
  font-style: normal;
  letter-spacing: 1px;
  font-weight: 300;
}

.btn {
  background: #1e1b0f;
  border: none;
  border-radius: 70px;
  padding: 18px 40px;
  font-size: 1.3rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #ffd700;
  border: 2px solid #d4af37;
  box-shadow: 0 10px 0 #0f0e08, 0 15px 25px black;
  cursor: pointer;
  transition: 0.08s linear;
  background: linear-gradient(145deg, #2a2415, #141107);
}

.btn:hover {
  transform: translateY(5px);
  box-shadow: 0 5px 0 #0f0e08, 0 15px 30px black;
  background: #2f2816;
  color: #ffe87c;
  border-color: #ffd700;
}

.btn:active {
  transform: translateY(10px);
  box-shadow: 0 2px 0 #0f0e08, 0 10px 20px black;
}
        /* HINT BOX - ELEGAN */
    .hint-box {
      background: #0a0802;
      border-radius: 70px;
      padding: 20px 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      border: 2px solid #9b822b;
      box-shadow: inset 0 3px 8px #000000, 0 10px 20px black;
    }

    .hint-text {
      color: #ffe9a7;
      font-size: 1.4rem;
      font-weight: 500;
      background: #1e1a0c;
      padding: 12px 35px;
      border-radius: 60px;
      border-left: 8px solid #ffd700;
      box-shadow: inset 0 2px 8px black;
      flex: 2 1 320px;
      letter-spacing: 0.5px;
    }

    .hint-btn {
      background: #1a1507;
      border: 3px solid #ffd700;
      color: #ffd700;
      padding: 14px 40px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
      transition: 0.2s;
      cursor: pointer;
      backdrop-filter: blur(5px);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .hint-btn:hover {
      background: #ffd700;
      color: #000;
      border-color: #fff2b5;
      box-shadow: 0 0 50px gold;
    }

    /* STATS - DIPINDAHKAN KE POJOK KANAN (SESUAI PERMINTAAN) */
    .stats-bar {
      display: flex;
      justify-content: flex-end;
      margin: 25px 0 5px;
      padding: 0 5px;
    }

    .remaining-badge {
      background: #0f0e0a;
      border-radius: 60px;
      padding: 15px 35px;
      border: 2px solid #d4af37;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.5), inset 0 0 10px black;
      color: #fff0b5;
      font-size: 1.3rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 15px;
    }

    .remaining-badge span {
      font-weight: 800;
      color: #ffd700;
      font-size: 2.2rem;
      text-shadow: 0 0 25px gold, 0 0 40px orange;
    }

    /* PESAN FEEDBACK */
    .message {
      text-align: center;
      font-size: 1.3rem;
      margin: 15px 0 5px;
      min-height: 3rem;
      font-weight: 600;
    }

    .success-msg {
      color: #b9ff9b;
      text-shadow: 0 0 10px #00aa00, 0 0 20px #00ff00;
    }
    .error-msg {
      color: #ffb28b;
      text-shadow: 0 0 10px #aa3300, 0 0 20px #ff5500;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      color: #a58d4d;
      margin-top: 25px;
      font-size: 1rem;
      border-top: 2px solid #4a3e1f;
      padding-top: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>

    { code: 'eh', name: 'sahara barat' }, { code: 'ps', name: 'palestina' }

  // STATE
  let remainingItems = [];
  let currentFlag = null;

  const flagImg = document.getElementById('flagImage');
  const guessInput = document.getElementById('guessInput');
  const submitBtn = document.getElementById('submitGuess');
  const hintBtn = document.getElementById('hintBtn');
  const hintDisplay = document.getElementById('hintDisplay');
  const messageArea = document.getElementById('messageArea');
  const remainingSpan = document.getElementById('remainingCount');

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    remainingItems = countries.map(c => ({ code: c.code, name: c.name }));
    remainingItems = shuffleArray(remainingItems);
    pickNewFlag();
    updateRemainingCounter();
    messageArea.innerHTML = '';
  }

  function pickNewFlag() {
    if (remainingItems.length === 0) {
      currentFlag = null;
      flagImg.src = '';
      flagImg.alt = 'Selesai!';
      hintDisplay.innerText = '✨ SELESAI! SEMUA BENDERA TERBAK ✨';
      return;
    }
    const randomIndex = Math.floor(Math.random() * remainingItems.length);
    currentFlag = { ...remainingItems[randomIndex] };
    flagImg.src = `${FLAG_BASE}${currentFlag.code}.png`;
    flagImg.alt = `bendera ${currentFlag.name}`;
    hintDisplay.innerText = '👑 TEKAN HINT UNTUK PETUNJUK';
    guessInput.value = '';
    messageArea.innerHTML = '';
  }

  function updateRemainingCounter() {
    remainingSpan.innerText = remainingItems.length;
  }

  function removeCurrentFromRemaining() {
    if (!currentFlag) return;
    remainingItems = remainingItems.filter(item => item.code !== currentFlag.code);
  }

  function showHint() {
    if (!currentFlag) {
      hintDisplay.innerText = '🏁 GAME SELESAI';
      return;
    }
    const name = currentFlag.name;
    if (name.length <= 3) {
      hintDisplay.innerText = `🔎 HINT: ${name}`;
    } else {
      hintDisplay.innerText = `🔎 HINT: ${name.substring(0, 3)}...${name.substring(name.length - 2)}`;
    }
  }

  function handleGuess() {
    if (!currentFlag) {
      messageArea.innerHTML = '<span class="success-msg">✨ SEMUA BENDERA TERBAK ✨</span>';
      return;
    }

    const userAnswer = guessInput.value.trim().toLowerCase();
    if (userAnswer === '') {
      messageArea.innerHTML = '<span class="error-msg">⚠️ MASUKKAN NAMA NEGARA</span>';
      return;
    }

    if (userAnswer === currentFlag.name.toLowerCase()) {
      messageArea.innerHTML = '<span class="success-msg">✓ BENAR! BENDERA DIHAPUS</span>';
      removeCurrentFromRemaining();
      updateRemainingCounter();

      if (remainingItems.length > 0) {
        pickNewFlag();
      } else {
        currentFlag = null;
        flagImg.src = '';
        hintDisplay.innerText = '🏁 GAME COMPLETE 🏁';
        messageArea.innerHTML = '<span class="success-msg">🎉 SELAMAT! ANDA MENANG 🎉</span>';
        remainingSpan.innerText = '0';
      }
    } else {
      messageArea.innerHTML = '<span class="error-msg">✗ SALAH! COBA LAGI (DIACAK ULANG)</span>';
      if (remainingItems.length > 0) {
        pickNewFlag();
      }
    }
  }

  submitBtn.addEventListener('click', handleGuess);
  hintBtn.addEventListener('click', showHint);
  guessInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitBtn.click();
  });

  initGame();
})();
